name: Download Logo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-logo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download logo from Google Drive
        run: |
          LOGO_ID="1gxV3NGEd3FOhZadiZJ86V6J2xjFMcRBd"
          curl -L "https://drive.usercontent.google.com/download?id=${LOGO_ID}&export=download&confirm=t" -o logo.png --max-time 30 -A "Mozilla/5.0"
          file logo.png && ls -lh logo.png
          if ! file logo.png | grep -qiE "PNG|image|JPEG"; then
            curl -L "https://drive.google.com/uc?export=download&id=${LOGO_ID}&confirm=t" -o logo.png --max-time 30
          fi
          file logo.png

      - name: Commit logo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logo.png
          git diff --staged --quiet || git commit -m "اضافة لوقو الشركة الرسمي"
          git push
